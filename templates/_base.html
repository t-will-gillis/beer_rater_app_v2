{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}BeerRater{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{% static 'css/base.css' %}" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-warning">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="{% url 'home' %}">BeerRater</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain" aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMain">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a href="{% url 'home' %}" class="nav-link">Home</a></li>
                    <li class="nav-item"><a href="{% url 'beer_list' %}" class="nav-link">Beers</a></li>
                    <li class="nav-item"><a href="{% url 'brewery_list' %}" class="nav-link">Breweries</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Reviews</a></li>
                    <li class="nav-item"><a href="{% url 'about' %}" class="nav-link">About</a></li>
                </ul>
                <form class="d-flex me-3" action="{% url 'search_results' %}" method="get">
                    <input class="form-control form-control-sm me-2 search-input" type="search" name="q" placeholder="Search beers..." aria-label="Search">
                    <button class="btn btn-sm btn-outline-warning" type="submit">
                        <i class="bi bi-search"></i>
                    </button>
                </form>
                {% if user.is_authenticated %}
                <div class="dropdown">
                    <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">{{ user.email }}</a>
                    <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                        <li><a href="{% url 'account_logout' %}" class="dropdown-item"><i class="bi bi-box-arrow-right me-2"></i>Log Out</a></li>
                    </ul>
                </div>
                {% else %}
                <div class="d-flex gap-2">
                    <a href="{% url 'account_login' %}" class="btn btn-sm btn-outline-light">Log In</a>
                    <a href="{% url 'account_signup' %}" class="btn btn-sm btn-warning">Sign Up</a>
                </div>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/base.js' %}"></script>
</body>
</html>
