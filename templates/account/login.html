{% extends "_base.html" %}
{% load crispy_forms_tags %}

{% block title %}Log In{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="card">
        <div class="card-body p-4">
            <h2 class="text-center mb-4"><i class="bi bi-person-circle me-2"></i>Log In</h2>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-grid mt-3">
                    <button class="btn btn-warning" type="submit">Log In</button>
                </div>
            </form>
            <hr class="border-secondary my-4">
            <p class="text-center text-secondary small mb-0">
                Don't have an account? <a href="{% url 'account_signup' %}" class="text-warning">Sign Up</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
