{% extends "_base.html" %}

{% block title %}Delete Review{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-4">
                <h2 class="text-warning mb-3">Delete Review</h2>
                <p class="text-light">Are you sure you want to delete your review of <strong>{{ review.beer.name }}</strong>? This cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 mt-4">
                        <button class="btn btn-danger" type="submit">Yes, Delete</button>
                        <a href="{% url 'beer_detail' review.beer.pk %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
